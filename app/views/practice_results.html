<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Analysis Results - DELIVER</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="/Deliver.svg" alt="Deliver Logo" class="logo">
            <img src="/EU_logo.svg" alt="EU Logo" class="logo">
            <img src="/manchester_logo.png" alt="Manchester Logo" class="logo">
        </div>
        <h1>Practice Analysis Results</h1>
    </header>

    <main>
        <div class="result-container">
            <h2>{{ practice_name }} - Analysis</h2>
            <div class="summary">
                <h3>Overall Sentiment:</h3>
                <p class="sentiment-positive">Positive</p>
                <h3>Key Themes:</h3>
                <ul>
                    <li>Professionalism</li>
                    <li>Cleanliness</li>
                    <li>Customer Service</li>
                </ul>
            </div>
            <a href="/practice_search.html" class="btn">Analyze Another Practice</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 DELIVER. All rights reserved.</p>
    </footer>
</body>
</html>
