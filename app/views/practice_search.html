<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse Reviews - DELIVER</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="/Deliver.svg" alt="Deliver Logo" class="logo">
            <img src="/EU_logo.svg" alt="EU Logo" class="logo">
            <img src="/manchester_logo.png" alt="Manchester Logo" class="logo">
        </div>
        <h1>Analyse Reviews</h1>
        <p>Enter a search query to find a dental practice.</p>
    </header>

    <main>
        <div class="search-container">
            <form action="/search" method="POST">
                <input type="text" name="query" placeholder="e.g., 'dentist in Manchester'" required>
                <button type="submit" class="btn">Search</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 DELIVER. All rights reserved.</p>
    </footer>
</body>
</html>
