<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Result - DELIVER</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="/Deliver.svg" alt="Deliver Logo" class="logo">
            <img src="/EU_logo.svg" alt="EU Logo" class="logo">
            <img src="/manchester_logo.png" alt="Manchester Logo" class="logo">
        </div>
        <h1>Analysis Result</h1>
    </header>

    <main>
        <div class="result-container">
            <h2>Single Review Analysis</h2>
            <div class="review">
                <h3>Original Review:</h3>
                <p>"The staff was friendly but I had to wait a long time..."</p>
            </div>
            <div class="analysis">
                <h3>Sentiment:</h3>
                <p class="sentiment-positive">Positive</p>
                <h3>Themes:</h3>
                <ul>
                    <li>Staff Friendliness</li>
                    <li>Waiting Time</li>
                </ul>
            </div>
            <a href="/" class="btn">Analyze Another Review</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 DELIVER. All rights reserved.</p>
    </footer>
</body>
</html>
